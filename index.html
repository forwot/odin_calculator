<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="calculator">
        <div class="screen-container">
            <div id="screen-operate"></div>
            <div id="screen-next"></div>
        </div>

        <div class="buttons-container">
            <button id="clear">CLEAR</button>
            <button id="delete">DELETE</button>

            <button class="btn nbtn">7</button>
            <button class="btn nbtn">8</button>
            <button class="btn nbtn">9</button>
            <button class="btn op-btn">÷</button>

            <button class="btn nbtn">4</button>
            <button class="btn nbtn">5</button>
            <button class="btn nbtn">6</button>
            <button class="btn op-btn">x</button>
            
            <button class="btn nbtn">1</button>
            <button class="btn nbtn">2</button>
            <button class="btn nbtn">3</button>
            <button class="btn op-btn">-</button>

            <button class="btn nbtn">.</button>
            <button class="btn nbtn">0</button>
            <button class="btn" id="equals">=</button>
            <button class="btn op-btn">+</button>


        </div>
    </div>
    
</body>
</html>
